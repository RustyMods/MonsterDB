Visuals:
  scale: 1
  renderers:
  - prefab: Cube
    parent: blob
    index: 1
    active: true
    enabled: true
    materials:
    - name: crystal_window
      shader: Standard
      color: RGBA(1.000, 1.000, 1.000, 0.376)
      emissionColor: RGBA(0.669, 0.796, 1.000, 0.639)
      glossiness: 0.9
      metallic: 1
      bumpScale: 1.2
      bumpTexture: crystal_window_n
  - prefab: ooz
    parent: particles
    index: 0
    active: true
    enabled: true
    materials:
    - name: smoke
      shader: Lux Lit Particles/ Bumped
      color: RGBA(1.000, 1.000, 1.000, 1.000)
      emissionColor: RGBA(0.000, 0.000, 0.000, 1.000)
      mainTexture: dust01_bw
  lights:
  - prefab: Point light
    parent: Visual
    index: 1
    active: true
    color: RGBA(0.184, 0.883, 0.933, 1.000)
    type: Point
    intensity: 2
    range: 3
  particleSystems:
  - prefab: ooz
    parent: particles
    index: 0
    startColor:
      # Color, Gradient, TwoColors, TwoGradients, RandomColor
      mode: TwoColors
      color: RGBA(0.502, 0.940, 1.000, 0.159)
      colorMin: RGBA(0.557, 0.812, 1.000, 0.141)
      colorMax: RGBA(0.502, 0.940, 1.000, 0.159)
    colorOverLifetime:
      # Color, Gradient, TwoColors, TwoGradients, RandomColor
      mode: Gradient
      color: RGBA(-8013704000000.000, 0.000, -12232070000000.000, 0.000)
      colorMin: RGBA(-8013738000000.000, 0.000, -8013721000000.000, 0.000)
      colorMax: RGBA(-8013704000000.000, 0.000, -12232070000000.000, 0.000)
      gradient:
        # Blend, Fixed, PerceptualBlend
        mode: Blend
        # Set opacity over time
        alphaKeys:
        - alpha: 0
          time: 0
        - alpha: 1
          time: 0.520592
        - alpha: 0
          time: 1
        # Set color over time
        colorKeys:
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 0
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 1
        # Uninitialized, Gamma, Linear
        colorSpace: Uninitialized
      gradientMax:
        # Blend, Fixed, PerceptualBlend
        mode: Blend
        # Set opacity over time
        alphaKeys:
        - alpha: 0
          time: 0
        - alpha: 1
          time: 0.520592
        - alpha: 0
          time: 1
        # Set color over time
        colorKeys:
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 0
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 1
        # Uninitialized, Gamma, Linear
        colorSpace: Uninitialized
# If field removed, will remove component
