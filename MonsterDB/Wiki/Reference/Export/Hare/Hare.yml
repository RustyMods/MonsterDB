  lavaFullDamage: 100
  lavaAirDamageHeight: 3
  dayHeatGainRunning: 0.2
  dayHeatGainStill: -0.05
  dayHeatEquipmentStop: 0.5
  lavaSlowMax: 0.5
  lavaSlowHeight: 0.8
AI:
  timeToSafe: 15
  viewRange: 25
  viewAngle: 45
  hearRange: 15
  mistVision: false
  alertedEffects:
    effectPrefabs:
    - prefab: sfx_hare_alerted
      variant: -1
  idleSound:
    effectPrefabs:
    - prefab: sfx_hare_idle
      variant: -1
  idleSoundInterval: 15
  idleSoundChance: 0.5
