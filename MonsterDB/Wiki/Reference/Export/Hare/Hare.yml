  faction: AnimalsVeg
  boss: false
  dontHideBossHud: false
  aiSkipTarget: false
  # Speed
  crouchSpeed: 1
  walkSpeed: 1
  speed: 4
  turnSpeed: 200
  runSpeed: 7
  runTurnSpeed: 300
  acceleration: 0.9
  # Jumping
  jumpForce: 10
  jumpForceForward: 0
  jumpForceTiredFactor: 0.7
  airControl: 0.1
  jumpStaminaUsage: 10
  # Flying
  flying: false
  flySlowSpeed: 5
  flyFastSpeed: 12
  flyTurnSpeed: 12
  canSwim: true
  swimDepth: 0.72
  swimSpeed: 2
  swimTurnSpeed: 100
  swimAcceleration: 0.05
  groundTilt: Pitch
  groundTiltSpeed: 200
  # Gravity disabled while sleeping
  disableWhileSleeping: false
  useAltStatusEffectScaling: false
  tolerateWater: true
  tolerateFire: false
  tolerateSmoke: false
  tolerateTar: false
  # Effects
  hitEffects:
    effectPrefabs:
    - prefab: vfx_deer_hit
      variant: -1
    - prefab: sfx_hare_death_vocal
      variant: -1
  critHitEffects:
    effectPrefabs:
    - prefab: fx_crit
      variant: -1
  backstabHitEffects:
    effectPrefabs:
    - prefab: fx_backstab
      variant: -1
  deathEffects:
    effectPrefabs:
    - prefab: fx_hare_death
      variant: -1
    - prefab: Hare_ragdoll
      variant: -1
    - prefab: sfx_hare_death_vocal
      variant: -1
  waterEffects:
    effectPrefabs:
    - prefab: vfx_water_surface
      variant: -1
      attach: true
  # Base Health
  health: 10
  regenAllHPTime: 3600
  damageModifiers:
    chop: Ignore
    pickaxe: Ignore
    spirit: Immune
  staggerWhenBlocked: true
  staggerDamageFactor: 0
  enemyAdrenalineMultiplier: 1
  # Lava
  minLavaMaskThreshold: 0.05
  heatBuildupBase: 1.5
  heatCooldownBase: 1
  heatBuildupWater: 2
  heatWaterTouchMultiplier: 0.2
  lavaDamageTickInterval: 0.2
