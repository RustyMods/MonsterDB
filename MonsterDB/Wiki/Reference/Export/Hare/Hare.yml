  moveMinAngle: 90
  smoothMovement: true
  serpentMovement: false
  serpentTurnRadius: 20
  jumpInterval: 0
  randomCircleInterval: 2
  randomMoveInterval: 11
  randomMoveRange: 20
  randomFly: false
  chanceToTakeoff: 1
  chanceToLand: 1
  # Flying
  groundDuration: 10
  airDuration: 10
  maxLandAltitude: 5
  takeoffTime: 5
  flyAltitudeMin: 3
  flyAltitudeMax: 10
  flyAbsMinAltitude: 32
  avoidFire: true
  afraidOfFire: true
  avoidWater: true
  avoidLava: true
  skipLavaTargets: false
  avoidLavaFlee: true
  aggravatable: false
  passiveAggressive: true
  fleeRange: 25
  fleeAngle: 45
  fleeInterval: 2
Visuals:
  scale: 1
  levelSetups:
  - scale: 1.1
    hue: -0.142
    value: 0.13
    emissiveColor: RGBA(1.000, 0.850, 0.000, 1.000)
  - scale: 1.4
    hue: -0.5
    value: 0.4
    emissiveColor: RGBA(1.000, 1.000, 1.000, 1.000)
  renderers:
  - prefab: Hare
    parent: Visual
    index: 1
    active: true
    enabled: true
    materials:
    - name: Hare_mat
      shader: Custom/Creature
      color: RGBA(1.000, 1.000, 1.000, 1.000)
      hue: 0
      saturation: 0
      value: 0
      emissionColor: RGBA(0.000, 0.000, 0.000, 1.000)
      mainTexture: hare_d
      glossiness: 0.67
      metallic: 0
      bumpScale: 1
      bumpTexture: hare_n
# If field removed, will remove component
Drops:
  drops:
  - prefab: HareMeat
    amountMin: 1
    amountMax: 1
    chance: 1
    onePerPlayer: false
    levelMultiplier: true
    dontScale: false
  - prefab: ScaleHide
    amountMin: 1
    amountMax: 3
    chance: 1
    onePerPlayer: false
    levelMultiplier: true
    dontScale: false
  - prefab: TrophyHare
    amountMin: 1
    amountMax: 1
    chance: 0.05
    onePerPlayer: false
    levelMultiplier: false
    dontScale: false
  # Only works if Character Death Effects do not have a ragdoll
  dropsEnabled: true
FootStep:
  footlessFootsteps: false
  footlessTriggerDistance: 1
  footstepCullDistance: 20
  effects:
  - name: Default
    motionType: Jog, Run
    material: Default
    effectPrefabs:
    - sfx_hare_footstep_run
# Reference only, these are attack animation triggers
AnimationTriggers:
- forward_speed
- sideway_speed
- turn_speed
- jump
- inWater
- dead
- wakeup
- footstep
- random
- idle
