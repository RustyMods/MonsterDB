      colorMin: RGBA(0.142, 0.118, 0.122, 0.482)
      colorMax: RGBA(0.689, 0.517, 0.544, 0.588)
    colorOverLifetime:
      # Color, Gradient, TwoColors, TwoGradients, RandomColor
      mode: Gradient
      color: RGBA(0.000, 0.000, 0.000, 0.000)
      colorMin: RGBA(0.000, 0.000, 0.000, 0.000)
      colorMax: RGBA(0.000, 0.000, 0.000, 0.000)
      gradient:
        # Blend, Fixed, PerceptualBlend
        mode: Blend
        # Set opacity over time
        alphaKeys:
        - alpha: 0
          time: 0
        - alpha: 1
          time: 0.4764782
        - alpha: 0
          time: 1
        # Set color over time
        colorKeys:
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 0
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 1
        # Uninitialized, Gamma, Linear
        colorSpace: Gamma
      gradientMax:
        # Blend, Fixed, PerceptualBlend
        mode: Blend
        # Set opacity over time
        alphaKeys:
        - alpha: 0
          time: 0
        - alpha: 1
          time: 0.4764782
        - alpha: 0
          time: 1
        # Set color over time
        colorKeys:
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 0
        - color: RGBA(1.000, 1.000, 1.000, 1.000)
          time: 1
        # Uninitialized, Gamma, Linear
        colorSpace: Gamma
