      color: RGBA(-9262567000000.000, 0.000, -13859860000000.000, 0.000)
      colorMin: RGBA(-9262634000000.000, 0.000, -9262600000000.000, 0.000)
      colorMax: RGBA(-9262567000000.000, 0.000, -13859860000000.000, 0.000)
      gradient:
        # Blend, Fixed, PerceptualBlend
        mode: Blend
        # Set opacity over time
