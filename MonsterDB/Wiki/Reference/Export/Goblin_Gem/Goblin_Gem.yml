  afraidOfFire: true
  avoidWater: true
  avoidLava: true
  skipLavaTargets: false
  avoidLavaFlee: true
  aggravatable: false
  passiveAggressive: true
  fleeRange: 30
  fleeAngle: 45
  fleeInterval: 2
